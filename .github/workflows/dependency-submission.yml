
name: Dependency Submission

on:
  workflow_dispatch:
  push:

permissions:
  id-token: write
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: setup-ecosystem
        run: |
          if [ -f "global.json" ]; then
          if [ -f "global.json" ]; then
            echo "Found global.json file"
            echo "use-global-json=true" >> "$GITHUB_OUTPUT"
          else
            echo "No global.json file found, using default versions"
            echo "use-global-json=false" >> "$GITHUB_OUTPUT"
          fi
        shell: /usr/bin/bash -e {0}
        env:
          SKIP_CACHE: 
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
                          9.0.x
                          10.0.x
          cache: false
      - name: Install MAUI Workloads
        run: |
          dotnet workload restore
      - name: log-toolchain-versions
        run: |
          version=$(dotnet --version)
          echo "::notice::Using .NET SDK version: $version"
          dotnet --list-sdks
        shell: /usr/bin/bash --noprofile --norc -e -o pipefail {0}
        env:
          SKIP_CACHE: 
          DOTNET_ROOT: /usr/share/dotnet
      - name: check-cache-strategy
        run: |
           if [[ -n "" ]]; then
              echo "NuGet cache disabled via 'GH_DEPENDENCY_SUBMISSION_SKIP_CACHE'"
            else
              echo "Caching NuGet packages. Set 'GH_DEPENDENCY_SUBMISSION_SKIP_CACHE=true' to skip caching in future."
            fi
        shell: /usr/bin/bash -e {0}
        env:
          SKIP_CACHE: 
          DOTNET_ROOT: /usr/share/dotnet
      - name: configure-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.nuget/packages
          key: Linux-nuget-8b286f26666f2a45f829dfda0dad7e6a740718ada5d00bb2a127dcdd3671f303
          restore-keys: Linux-nuget-
        
          enableCrossOsArchive: false
          fail-on-cache-miss: false
          lookup-only: false
          save-always: false
        env:
          SKIP_CACHE: 
          DOTNET_ROOT: /usr/share/dotnet
      - name: validate-project
        run: |
          # Find all project files
          project_files=$(find . -type f \( -name "*.csproj" -o -name "*.sln" -o -name "*.vbproj" -o -name "*.vcxproj" -o -name "*.fsproj" \) | grep -v '/obj/' | grep -v '/bin/' | head -20)
          
          if [ -z "$project_files" ]; then
            echo "valid-project=false" >> "$GITHUB_OUTPUT"
            echo "### :warning: No .NET project files found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**This repository does not appear to contain any .NET project files.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Searched for: *.csproj, *.sln, packages.config, *.vbproj, *.vcxproj, *.fsproj" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "If this is a .NET project, ensure your project files are committed to the repository." >> $GITHUB_STEP_SUMMARY
            echo "::error::No .NET project files found in repository"
            exit 1
          fi
          
          echo "Found project files:"
          echo "$project_files"
          
          # Restore all projects
          while IFS= read -r project; do
            echo "Restoring project: $project"
            if ! dotnet restore "$project"; then
              echo "::error::Failed to restore project: $project"
              echo "valid-project=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          done <<< "$project_files"
          
          echo "::debug::All projects restored successfully"
          echo "valid-project=true" >> "$GITHUB_OUTPUT"
        shell: /usr/bin/bash -e {0}
        env:
          SKIP_CACHE: 
          DOTNET_ROOT: /usr/share/dotnet
      - name: submit-dependency-snapshot
        uses: actions/component-detection-dependency-submission-action@374343effede691df3a5ffaf36b4e7acab919590
        with:
          detectorsCategories: NuGet
          filePath: .
        env:
          SKIP_CACHE: 
          DOTNET_ROOT: /usr/share/dotnet