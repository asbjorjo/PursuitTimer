
name: Dependency Submission

on:
  workflow_dispatch:
  push:

permissions:
  id-token: write
  contents: write

jobs:
  dependency-submission:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: false
      - name: Install MAUI Workloads
        run: |
          dotnet workload install ios
          dotnet workload install maui
      - name: configure-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.nuget/packages
          key: Linux-nuget-8b286f26666f2a45f829dfda0dad7e6a740718ada5d00bb2a127dcdd3671f303
          restore-keys: ios-nuget-
          enableCrossOsArchive: false
          fail-on-cache-miss: false
          lookup-only: false
          save-always: false
        env:
          SKIP_CACHE: 
          DOTNET_ROOT: /usr/share/dotnet
      - name: validate-project
        run: |
          dotnet restore PursuitTimer -r ios-arm64
        env:
          SKIP_CACHE: 
          DOTNET_ROOT: /usr/share/dotnet
      - name: submit-dependency-snapshot
        uses: actions/component-detection-dependency-submission-action@374343effede691df3a5ffaf36b4e7acab919590
        with:
          detectorsCategories: NuGet
          filePath: .
        env:
          SKIP_CACHE: 
          DOTNET_ROOT: /usr/share/dotnet